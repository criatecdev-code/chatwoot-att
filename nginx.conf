# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wizzachat.gruposels.com.br;
    return 301 https://$host$request_uri;
}

# ATENÇÃO: o front-end roda como arquivo estático na Hostgator.
# Esta VPS hospeda APENAS o whatsapp-service (porta 3003).
# O backend NestJS fica no Vercel (wizzachat-back.vercel.app).

server {
    listen 443 ssl;
    server_name wizzachat.gruposels.com.br;

    ssl_certificate     /etc/letsencrypt/live/wizzachat.gruposels.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wizzachat.gruposels.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # -------------------------------------------------------
    # Socket.IO — WhatsApp Service (porta 3003)
    # O frontend conecta com path "/api/socket.io"
    # -------------------------------------------------------
    location /api/socket.io/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------
    # REST API — WhatsApp Service (porta 3003)
    # Endpoints: /start-instance, /disconnect, /send-message, etc.
    # -------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
